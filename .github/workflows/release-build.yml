name: Android Release Build

on:
  pull_request:
    branches: [main]
    # Include edited so develop -> main retargets materialize release gates without a new commit.
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-build:
    name: Build signed release AAB artifact
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name != 'pull_request' ||
      startsWith(github.head_ref, 'release/') ||
      startsWith(github.head_ref, 'hotfix/')

    env:
      ANDROID_KEYSTORE_PATH: /tmp/stopit-upload-key.jks

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate release build secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo 'ANDROID_KEYSTORE_BASE64 secret is missing'; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo 'ANDROID_KEYSTORE_PASSWORD secret is missing'; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo 'ANDROID_KEY_ALIAS secret is missing'; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo 'ANDROID_KEY_PASSWORD secret is missing'; exit 1; }
          test -n "$GOOGLE_SERVICES_JSON" || { echo 'GOOGLE_SERVICES_JSON secret is missing'; exit 1; }

      - name: Decode signing and Firebase config
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          mkdir -p app/src/prod
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/src/prod/google-services.json
          chmod 600 "$ANDROID_KEYSTORE_PATH" app/src/prod/google-services.json

      - name: Run release unit tests
        run: ./gradlew :app:testProdReleaseUnitTest

      - name: Build signed prod release bundle
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:bundleProdRelease

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: stopit-prod-release-signed-aab
          path: app/build/outputs/bundle/prodRelease/*.aab
          if-no-files-found: error
          retention-days: 30
