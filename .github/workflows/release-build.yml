name: Android Release Build

on:
  pull_request:
    branches: [main]
    # Include edited so develop -> main retargets materialize release gates without a new commit.
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-build:
    name: Build signed release AAB artifact
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name != 'pull_request' ||
      startsWith(github.head_ref, 'release/') ||
      startsWith(github.head_ref, 'hotfix/')

    env:
      ANDROID_KEYSTORE_PATH: /tmp/stopit-upload-key.jks

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate manual release build ref
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          allowed=false
          if [ "$GITHUB_REF_TYPE" = "branch" ]; then
            case "$GITHUB_REF_NAME" in
              "main"|release/*|hotfix/*) allowed=true ;;
            esac
          elif [ "$GITHUB_REF_TYPE" = "tag" ]; then
            if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              allowed=true
            fi
          fi

          if [ "$allowed" != "true" ]; then
            echo "Manual Android Release Build runs are limited to main, release/*, hotfix/*, or SemVer tag refs."
            echo "Selected ref: type=$GITHUB_REF_TYPE name=$GITHUB_REF_NAME"
            echo "This run will not decode signing secrets or build a signed AAB."
            exit 1
          fi

      - name: Validate release build secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo 'ANDROID_KEYSTORE_BASE64 secret is missing'; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo 'ANDROID_KEYSTORE_PASSWORD secret is missing'; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo 'ANDROID_KEY_ALIAS secret is missing'; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo 'ANDROID_KEY_PASSWORD secret is missing'; exit 1; }
          test -n "$GOOGLE_SERVICES_JSON" || { echo 'GOOGLE_SERVICES_JSON secret is missing'; exit 1; }

      - name: Decode signing and Firebase config
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          mkdir -p app/src/prod
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/src/prod/google-services.json
          chmod 600 "$ANDROID_KEYSTORE_PATH" app/src/prod/google-services.json

      - name: Run release unit tests
        run: ./gradlew :app:testProdReleaseUnitTest

      - name: Run prod release lint
        run: ./gradlew :app:lintProdRelease

      - name: Verify Navigation/Compose lint registry coverage
        run: >-
          python3 scripts/verify_lint_registry.py
          --report app/build/reports/lint-results-prodRelease.html
          --require-section "Included Additional Checks"
          --require-identifier androidx.navigation.common
          --require-identifier androidx.navigation.compose
          --require-identifier androidx.navigation.runtime
          --require-issue-id MissingSerializableAnnotation
          --require-issue-id MissingKeepAnnotation
          --require-issue-id WrongNavigateRouteType
          --forbid-text "Requires newer lint; these checks will be skipped!"
          --forbid-text ObsoleteLintCustomCheck

      - name: Build signed prod release bundle
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:bundleProdRelease

      - name: Generate release provenance manifest
        run: >-
          python3 scripts/release_provenance_manifest.py generate
          --aab-glob 'app/build/outputs/bundle/prodRelease/*.aab'
          --output app/build/outputs/bundle/prodRelease/release-provenance.json
          --artifact-name stopit-prod-release-signed-aab
          --package-name com.uiery.keep
          --upload-mode none
          --track ''
          --release-status ''
          --rollout-fraction ''

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: stopit-prod-release-signed-aab
          path: |
            app/build/outputs/bundle/prodRelease/*.aab
            app/build/outputs/bundle/prodRelease/release-provenance.json
          if-no-files-found: error
          retention-days: 30
