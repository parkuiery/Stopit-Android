name: Version Guard

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PACKAGE_NAME: com.uiery.keep

jobs:
  version-guard:
    name: Validate Android release version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate branch routing
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os

          head_ref = os.environ["HEAD_REF"]
          if not (head_ref.startswith("release/") or head_ref.startswith("hotfix/")):
              raise SystemExit(
                  "main-target PRs must come from release/* or hotfix/* so Version Guard always appears as a governance gate; "
                  f"got {head_ref}"
              )
          PY

      - name: Restore Google Play service account for guardrail
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          test -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" || { echo 'GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is missing'; exit 1; }
          service_account_path="$RUNNER_TEMP/google-play-service-account.json"
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > "$service_account_path"
          chmod 600 "$service_account_path"
          echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH=$service_account_path" >> "$GITHUB_ENV"

      - name: Resolve base and Google Play versionCode maxima
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          base_version_code="$(python3 - <<'PY'
          import os
          import subprocess
          from scripts.play_version_code_guard import parse_build_version_info

          text = subprocess.check_output(
              ['git', 'show', f"origin/{os.environ['BASE_REF']}:app/build.gradle.kts"],
              text=True,
          )
          print(parse_build_version_info(text).version_code)
          PY
          )"
          play_max_version_code="$(python3 scripts/play_version_code_guard.py fetch-play-max --package-name "$PACKAGE_NAME" --service-account-json "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH")"
          echo "BASE_VERSION_CODE=$base_version_code" >> "$GITHUB_ENV"
          echo "PLAY_MAX_VERSION_CODE=$play_max_version_code" >> "$GITHUB_ENV"
          echo "base: versionCode=$base_version_code"
          echo "play: maxUsedVersionCode=$play_max_version_code"

      - name: Validate versionName and versionCode
        run: |
          set -euo pipefail
          python3 scripts/play_version_code_guard.py validate-build \
            --build-file app/build.gradle.kts \
            --minimum-main-version-code "$BASE_VERSION_CODE" \
            --fallback-play-max-version-code "$PLAY_MAX_VERSION_CODE"
