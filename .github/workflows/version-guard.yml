name: Version Guard

on:
  pull_request:
    branches: [main]
    # Include edited so develop -> main retargets materialize release gates without a new commit.
    types: [opened, synchronize, reopened, ready_for_review, edited]

permissions:
  contents: read

env:
  PACKAGE_NAME: com.uiery.keep

jobs:
  version-guard:
    name: Validate Android release version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate branch routing
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os

          head_ref = os.environ["HEAD_REF"]
          if not (head_ref.startswith("release/") or head_ref.startswith("hotfix/")):
              raise SystemExit(
                  "main-target PRs must come from release/* or hotfix/* so Version Guard always appears as a governance gate; "
                  f"got {head_ref}"
              )
          PY

      - name: Classify Version Guard scope
        id: version_scope
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import fnmatch
          import os
          import subprocess

          # Version Guard must materialize on every main-target PR, but only
          # workflow/governance/docs-only hotfixes may skip Play API validation.
          # app/runtime/build-critical changes require app/build.gradle.kts versionCode bump.
          protected_patterns = (
              "app/**",
              "core/**",
              "gradle/**",
              "gradlew",
              "gradlew.bat",
              "build.gradle.kts",
              "settings.gradle.kts",
              "gradle.properties",
          )
          version_file = "app/build.gradle.kts"
          base_ref = os.environ["BASE_REF"]
          changed_files = subprocess.check_output(
              ["git", "diff", "--name-only", f"origin/{base_ref}...HEAD"],
              text=True,
          ).splitlines()

          def matches(path: str, pattern: str) -> bool:
              return path == pattern or fnmatch.fnmatch(path, pattern)

          version_file_changed = version_file in changed_files
          protected_changes = [
              path
              for path in changed_files
              if any(matches(path, pattern) for pattern in protected_patterns)
          ]
          version_validation_required = bool(protected_changes)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"version_file_changed={str(version_file_changed).lower()}", file=output)
              print(f"version_validation_required={str(version_validation_required).lower()}", file=output)

          if version_validation_required:
              print("Version Guard: app/runtime/build-critical changes require app/build.gradle.kts versionCode bump.")
              print("Version Guard protected changed files:")
              for path in protected_changes:
                  print(f"- {path}")
          else:
              print("Version Guard: workflow/governance/docs-only change; keeping job visible while skipping Play service account restore and versionCode API validation.")
          PY

      - name: Restore Google Play service account for guardrail
        if: steps.version_scope.outputs.version_validation_required == 'true'
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          test -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" || { echo 'GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is missing'; exit 1; }
          service_account_path="$RUNNER_TEMP/google-play-service-account.json"
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > "$service_account_path"
          chmod 600 "$service_account_path"
          echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH=$service_account_path" >> "$GITHUB_ENV"

      - name: Resolve base and Google Play versionCode maxima
        if: steps.version_scope.outputs.version_validation_required == 'true'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          base_version_code="$(python3 - <<'PY'
          import os
          import subprocess
          from scripts.play_version_code_guard import parse_build_version_info

          text = subprocess.check_output(
              ['git', 'show', f"origin/{os.environ['BASE_REF']}:app/build.gradle.kts"],
              text=True,
          )
          print(parse_build_version_info(text).version_code)
          PY
          )"
          play_max_version_code="$(python3 scripts/play_version_code_guard.py fetch-play-max --package-name "$PACKAGE_NAME" --service-account-json "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH")"
          echo "BASE_VERSION_CODE=$base_version_code" >> "$GITHUB_ENV"
          echo "PLAY_MAX_VERSION_CODE=$play_max_version_code" >> "$GITHUB_ENV"
          echo "base: versionCode=$base_version_code"
          echo "play: maxUsedVersionCode=$play_max_version_code"

      - name: Validate versionName and versionCode
        if: steps.version_scope.outputs.version_validation_required == 'true'
        run: |
          set -euo pipefail
          python3 scripts/play_version_code_guard.py validate-build \
            --build-file app/build.gradle.kts \
            --minimum-main-version-code "$BASE_VERSION_CODE" \
            --fallback-play-max-version-code "$PLAY_MAX_VERSION_CODE"
