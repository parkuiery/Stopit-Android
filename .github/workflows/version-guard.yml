name: Version Guard

on:
  pull_request:
    branches: [main]
    paths:
      - app/build.gradle.kts
      - .github/workflows/version-guard.yml

permissions:
  contents: read

jobs:
  version-guard:
    name: Validate Android release version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate versionName and versionCode
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re
          import subprocess

          head_ref = os.environ["HEAD_REF"]
          if not (head_ref.startswith("release/") or head_ref.startswith("hotfix/")):
              raise SystemExit(f"main PRs must come from release/* or hotfix/*, got {head_ref}")

          def parse(text: str) -> tuple[int, str]:
              code = re.search(r"versionCode\s*=\s*(\d+)", text)
              name = re.search(r'versionName\s*=\s*"([^"]+)"', text)
              if not code or not name:
                  raise SystemExit("versionCode/versionName not found")
              version_name = name.group(1)
              if not re.fullmatch(r"\d+\.\d+\.\d+", version_name):
                  raise SystemExit(f"versionName must be MAJOR.MINOR.PATCH, got {version_name}")
              return int(code.group(1)), version_name

          current_code, current_name = parse(Path("app/build.gradle.kts").read_text())
          base_file = subprocess.check_output(
              ["git", "show", f"origin/{os.environ['BASE_REF']}:app/build.gradle.kts"],
              text=True,
          )
          base_code, base_name = parse(base_file)

          print(f"base: versionName={base_name} versionCode={base_code}")
          print(f"pr:   versionName={current_name} versionCode={current_code}")

          if current_code <= base_code:
              raise SystemExit(f"versionCode must increase for Play upload: base={base_code}, pr={current_code}")
          PY
