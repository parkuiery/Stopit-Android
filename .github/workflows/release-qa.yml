name: Android Release QA

on:
  pull_request:
    branches: [main]
    # Include edited so develop -> main retargets materialize release gates without a new commit.
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-release-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-release-qa:
    name: Full release QA
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.head_ref, 'release/') ||
      startsWith(github.head_ref, 'hotfix/')
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Restore Firebase google-services.json files
        env:
          GOOGLE_SERVICES_JSON_DEV: ${{ secrets.GOOGLE_SERVICES_JSON_DEV }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          test -n "$GOOGLE_SERVICES_JSON_DEV" || { echo 'GOOGLE_SERVICES_JSON_DEV secret is missing'; exit 1; }
          test -n "$GOOGLE_SERVICES_JSON" || { echo 'GOOGLE_SERVICES_JSON secret is missing'; exit 1; }
          mkdir -p app/src/dev app/src/prod
          printf '%s' "$GOOGLE_SERVICES_JSON_DEV" > app/src/dev/google-services.json
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/src/prod/google-services.json

      - name: Run static policy unit tests
        run: python3 -m unittest scripts.tests.test_compose_compiler_gradle_contract scripts.tests.test_kds_dependency_catalog_contract scripts.tests.test_sensitive_logging_policy scripts.tests.test_android_manifest_contract scripts.tests.test_compose_icon_button_accessibility scripts.tests.test_locale_string_parity scripts.tests.test_flavor_application_id_contract scripts.tests.test_android_runtime_suites_manifest scripts.tests.test_verify_lint_registry scripts.tests.test_lint_registry_workflows

      - name: Run full release JVM and build QA
        run: |
          set -euo pipefail
          ./gradlew \
            :app:testDevDebugUnitTest \
            :app:testProdReleaseUnitTest \
            :app:lintProdRelease \
            :app:assembleProdDebug

      - name: Verify Navigation/Compose lint registry coverage
        run: >-
          python3 scripts/verify_lint_registry.py
          --report app/build/reports/lint-results-prodRelease.html
          --require-section "Included Additional Checks"
          --require-identifier androidx.navigation.common
          --require-identifier androidx.navigation.compose
          --require-identifier androidx.navigation.runtime
          --require-issue-id MissingSerializableAnnotation
          --require-issue-id MissingKeepAnnotation
          --require-issue-id WrongNavigateRouteType
          --forbid-text "Requires newer lint; these checks will be skipped!"
          --forbid-text ObsoleteLintCustomCheck

  release-instrumentation-qa:
    name: Release instrumentation QA
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.head_ref, 'release/') ||
      startsWith(github.head_ref, 'hotfix/')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Restore Firebase google-services.json files
        env:
          GOOGLE_SERVICES_JSON_DEV: ${{ secrets.GOOGLE_SERVICES_JSON_DEV }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          test -n "$GOOGLE_SERVICES_JSON_DEV" || { echo 'GOOGLE_SERVICES_JSON_DEV secret is missing'; exit 1; }
          test -n "$GOOGLE_SERVICES_JSON" || { echo 'GOOGLE_SERVICES_JSON secret is missing'; exit 1; }
          mkdir -p app/src/dev app/src/prod
          printf '%s' "$GOOGLE_SERVICES_JSON_DEV" > app/src/dev/google-services.json
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/src/prod/google-services.json

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android testing skill UI smoke and runtime QA
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            set -eu
            python3 scripts/android_runtime_suites.py run-connected release_focused_ui_smoke --before "./gradlew --console=plain :app:installDevDebug"
            python3 scripts/android_runtime_suites.py run-connected release_exact_alarm_default --before "./gradlew --console=plain :app:installDevDebug" --before "adb shell cmd appops reset com.uiery.keep.dev"
            python3 scripts/android_runtime_suites.py run-connected release_exact_alarm_denied --before "./gradlew --console=plain :app:installDevDebug" --before "adb shell appops set com.uiery.keep.dev SCHEDULE_EXACT_ALARM deny"
            python3 scripts/android_runtime_suites.py run-connected release_exact_alarm_allowed --before "./gradlew --console=plain :app:installDevDebug" --before "adb shell appops set com.uiery.keep.dev SCHEDULE_EXACT_ALARM allow"
            python3 scripts/android_runtime_suites.py run-connected release_remaining_runtime
            python3 scripts/android_runtime_suites.py run-connected notification_denied_receiver notification_denied_emergency_unlock --before "./gradlew --console=plain :app:installDevDebug" --before "adb shell appops set com.uiery.keep.dev POST_NOTIFICATION ignore"
