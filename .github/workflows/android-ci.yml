name: Android CI

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'tools/aso-screenshots/**'
  push:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'tools/aso-screenshots/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify-changes:
    name: Classify Android CI scope
    runs-on: ubuntu-latest
    outputs:
      android_ci: ${{ steps.filter.outputs.android_ci }}
      runtime_smoke: ${{ steps.filter.outputs.runtime_smoke }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Classify changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            # Build-critical root files should materialize Android CI even when app sources do not change.
            android_ci:
              - 'app/**'
              - 'core/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
              - '.github/workflows/android-ci.yml'
            runtime_smoke:
              - 'app/src/main/**'
              - 'app/src/androidTest/**'
              - 'app/src/dev/**'
              - 'app/src/prod/**'
              - 'app/build.gradle.kts'
              - 'gradle/**'
              - '.github/workflows/android-ci.yml'

  verify:
    name: Fast verification
    needs: classify-changes
    if: github.event_name == 'workflow_dispatch' || needs.classify-changes.outputs.android_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Restore Firebase google-services.json for CI variants
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          test -n "$GOOGLE_SERVICES_JSON" || { echo 'GOOGLE_SERVICES_JSON secret is missing'; exit 1; }
          mkdir -p app/src/dev app/src/prod
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/src/dev/google-services.json
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/src/prod/google-services.json

      - name: Run app unit tests
        run: ./gradlew --console=plain :app:testDevDebugUnitTest

      - name: Run dev lint gate
        run: ./gradlew --console=plain :app:lintDevDebug

      - name: Build prod debug APK
        run: ./gradlew --console=plain :app:assembleProdDebug

      - name: Upload prod debug APK
        uses: actions/upload-artifact@v7
        with:
          name: stopit-prod-debug-apk
          path: app/build/outputs/apk/prod/debug/*.apk
          if-no-files-found: error

  runtime-smoke:
    name: Runtime smoke gate
    needs: classify-changes
    if: (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && (github.event_name == 'workflow_dispatch' || needs.classify-changes.outputs.runtime_smoke == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Restore Firebase google-services.json for CI variants
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          test -n "$GOOGLE_SERVICES_JSON" || { echo 'GOOGLE_SERVICES_JSON secret is missing'; exit 1; }
          mkdir -p app/src/dev app/src/prod
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/src/dev/google-services.json
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/src/prod/google-services.json

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run focused Android runtime smoke gate
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            set -eu
            ./gradlew --console=plain :app:connectedDevDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.uiery.keep.qa.StopitReleaseSmokeTest,com.uiery.keep.qa.BackupRestoreRuntimeResetIntegrationTest,com.uiery.keep.receiver.ReceiverRuntimeIntegrationTest#bootReceiverRehydratesStoredRoutinesFromRoomAndSchedulesAlarm,com.uiery.keep.receiver.ReceiverRuntimeIntegrationTest#manifestRegistersBootReceiverForMyPackageReplaced,com.uiery.keep.receiver.ReceiverRuntimeIntegrationTest#packageReplacedRestoresRoutinesFromRoomAndSchedulesAlarm,com.uiery.keep.receiver.ReceiverRuntimeIntegrationTest#routineAlarmReceiverShowsNotificationRehydratesDataStoreAndReschedulesEnabledRoutine,com.uiery.keep.service.EmergencyUnlockExpiryIntegrationTest,com.uiery.keep.service.KeepMessagingServiceIntegrationTest,com.uiery.keep.service.KeepAccessibilityServiceIntegrationTest
            ./gradlew --console=plain :app:installDevDebug
            adb shell appops set com.uiery.keep POST_NOTIFICATION ignore
            ./gradlew --console=plain :app:connectedDevDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.uiery.keep.receiver.ReceiverRuntimeIntegrationTest#routineAlarmReceiverWithoutPostNotificationsPermissionQueuesFallbackNoticeRehydratesDataStoreAndReschedulesEnabledRoutine
