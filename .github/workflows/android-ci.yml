name: Android CI

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'tools/aso-screenshots/**'
  push:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'tools/aso-screenshots/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify-changes:
    name: Classify Android CI scope
    runs-on: ubuntu-latest
    outputs:
      android_ci: ${{ steps.filter.outputs.android_ci }}
      runtime_smoke: ${{ steps.filter.outputs.runtime_smoke }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Classify changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            # Build-critical root files should materialize Android CI even when app sources do not change.
            android_ci:
              - 'app/**'
              - 'core/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
              - 'scripts/verify_lint_registry.py'
              - 'scripts/android_runtime_suites.py'
              - 'scripts/tests/test_android_runtime_suites_manifest.py'
              - '.github/workflows/android-ci.yml'
            runtime_smoke:
              - 'app/src/main/**'
              - 'app/src/androidTest/**'
              - 'app/src/dev/**'
              - 'app/src/prod/**'
              - 'app/build.gradle.kts'
              - 'gradle/**'
              - 'scripts/android_runtime_suites.py'
              - 'scripts/tests/test_android_runtime_suites_manifest.py'
              - '.github/workflows/android-ci.yml'

  verify:
    name: Fast verification
    needs: classify-changes
    if: github.event_name == 'workflow_dispatch' || needs.classify-changes.outputs.android_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Run scripts regression tests
        run: python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run KDS module-local verification
        run: ./gradlew --console=plain :core:kds:testDebugUnitTest :core:kds:lintDebug :core:kds:assembleDebug

      - name: Check Firebase config availability
        id: firebase-config
        env:
          GOOGLE_SERVICES_JSON_DEV: ${{ secrets.GOOGLE_SERVICES_JSON_DEV }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          if [ -n "$GOOGLE_SERVICES_JSON_DEV" ] && [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo 'available=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo 'available=false' >> "$GITHUB_OUTPUT"
          if [ "${{ github.actor }}" = 'dependabot[bot]' ]; then
            {
              echo '### Dependabot Firebase secret boundary'
              echo 'Dependabot PR: Firebase secrets are unavailable, so app Gradle verification is deferred.'
              echo 'Run Android CI with workflow_dispatch from a trusted branch after review to execute app unit/lint/build tasks with repository Firebase secrets.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          test -n "$GOOGLE_SERVICES_JSON_DEV" || { echo 'GOOGLE_SERVICES_JSON_DEV secret is missing'; exit 1; }
          test -n "$GOOGLE_SERVICES_JSON" || { echo 'GOOGLE_SERVICES_JSON secret is missing'; exit 1; }

      - name: Restore Firebase google-services.json for CI variants
        if: steps.firebase-config.outputs.available == 'true'
        env:
          GOOGLE_SERVICES_JSON_DEV: ${{ secrets.GOOGLE_SERVICES_JSON_DEV }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          mkdir -p app/src/dev app/src/prod
          printf '%s' "$GOOGLE_SERVICES_JSON_DEV" > app/src/dev/google-services.json
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/src/prod/google-services.json

      - name: Run static policy unit tests
        if: steps.firebase-config.outputs.available == 'true'
        run: python3 -m unittest scripts.tests.test_compose_compiler_gradle_contract scripts.tests.test_kds_dependency_catalog_contract scripts.tests.test_sensitive_logging_policy scripts.tests.test_android_manifest_contract scripts.tests.test_compose_icon_button_accessibility scripts.tests.test_locale_string_parity scripts.tests.test_locale_string_quality_contract scripts.tests.test_verify_lint_registry scripts.tests.test_lint_registry_workflows

      - name: Run app unit tests
        if: steps.firebase-config.outputs.available == 'true'
        run: ./gradlew --console=plain :app:testDevDebugUnitTest

      - name: Run dev lint gate
        if: steps.firebase-config.outputs.available == 'true'
        run: ./gradlew --console=plain :app:lintDevDebug

      - name: Verify Navigation/Compose lint registry coverage
        if: steps.firebase-config.outputs.available == 'true'
        run: >-
          python3 scripts/verify_lint_registry.py
          --report app/build/reports/lint-results-devDebug.html
          --require-section "Included Additional Checks"
          --require-identifier androidx.navigation.common
          --require-identifier androidx.navigation.compose
          --require-identifier androidx.navigation.runtime
          --require-issue-id MissingSerializableAnnotation
          --require-issue-id MissingKeepAnnotation
          --require-issue-id WrongNavigateRouteType
          --forbid-text "Requires newer lint; these checks will be skipped!"
          --forbid-text ObsoleteLintCustomCheck

      - name: Build prod debug APK
        if: steps.firebase-config.outputs.available == 'true'
        run: ./gradlew --console=plain :app:assembleProdDebug

      - name: Upload prod debug APK
        if: steps.firebase-config.outputs.available == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: stopit-prod-debug-apk
          path: app/build/outputs/apk/prod/debug/*.apk
          if-no-files-found: error
          retention-days: 7

  runtime-smoke:
    name: Runtime smoke gate
    needs: classify-changes
    if: (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && (github.event_name == 'workflow_dispatch' || needs.classify-changes.outputs.runtime_smoke == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Check Firebase config availability
        id: runtime-firebase-config
        env:
          GOOGLE_SERVICES_JSON_DEV: ${{ secrets.GOOGLE_SERVICES_JSON_DEV }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          if [ -n "$GOOGLE_SERVICES_JSON_DEV" ] && [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo 'available=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo 'available=false' >> "$GITHUB_OUTPUT"
          if [ "${{ github.actor }}" = 'dependabot[bot]' ]; then
            {
              echo '### Dependabot Firebase secret boundary'
              echo 'Dependabot PR: Firebase secrets are unavailable, so runtime smoke is deferred.'
              echo 'Run Android CI with workflow_dispatch from a trusted branch after review to execute the emulator runtime smoke with repository Firebase secrets.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          test -n "$GOOGLE_SERVICES_JSON_DEV" || { echo 'GOOGLE_SERVICES_JSON_DEV secret is missing'; exit 1; }
          test -n "$GOOGLE_SERVICES_JSON" || { echo 'GOOGLE_SERVICES_JSON secret is missing'; exit 1; }

      - name: Restore Firebase google-services.json for CI variants
        if: steps.runtime-firebase-config.outputs.available == 'true'
        env:
          GOOGLE_SERVICES_JSON_DEV: ${{ secrets.GOOGLE_SERVICES_JSON_DEV }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          mkdir -p app/src/dev app/src/prod
          printf '%s' "$GOOGLE_SERVICES_JSON_DEV" > app/src/dev/google-services.json
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/src/prod/google-services.json

      - name: Enable KVM for Android emulator
        if: steps.runtime-firebase-config.outputs.available == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run focused Android runtime smoke gate
        if: steps.runtime-firebase-config.outputs.available == 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            set -eu
            python3 scripts/android_runtime_suites.py run-connected android_ci_focused_runtime_smoke
            python3 scripts/android_runtime_suites.py run-connected notification_denied_receiver notification_denied_emergency_unlock --before "./gradlew --console=plain :app:installDevDebug" --before "adb shell appops set com.uiery.keep.dev POST_NOTIFICATION ignore"
            python3 scripts/android_runtime_suites.py run-connected notification_channel_disabled
