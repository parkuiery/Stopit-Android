name: Ops CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'functions/**'
      - 'scripts/promote-google-play-track.js'
      - 'scripts/notify-discord-deploy.py'
      - 'scripts/check-release-readiness.sh'
      - 'scripts/check-latest-production-deployed.sh'
      - 'scripts/release-start.sh'
      - 'scripts/bump-version.sh'
      - 'scripts/validate-play-deploy-ref.sh'
      - 'scripts/validate-play-rollout-inputs.js'
      - 'scripts/release-tag.sh'
      - 'scripts/check-play-deploy-secret-contract.sh'
      - 'scripts/setup-play-deploy-secrets.sh'
      - 'scripts/setup-discord-deploy-secrets.sh'
      - 'scripts/play_version_code_guard.py'
      - 'scripts/release_provenance_manifest.py'
      - 'scripts/verify_lint_registry.py'
      - 'scripts/check_workflow_gradle_tasks.py'
      - 'scripts/tests/**'
      - '.github/workflows/**'
      - 'docs/**'
      - '**/*.md'
  push:
    branches: [main, develop]
    paths:
      - 'functions/**'
      - 'scripts/promote-google-play-track.js'
      - 'scripts/notify-discord-deploy.py'
      - 'scripts/check-release-readiness.sh'
      - 'scripts/check-latest-production-deployed.sh'
      - 'scripts/release-start.sh'
      - 'scripts/bump-version.sh'
      - 'scripts/validate-play-deploy-ref.sh'
      - 'scripts/validate-play-rollout-inputs.js'
      - 'scripts/release-tag.sh'
      - 'scripts/check-play-deploy-secret-contract.sh'
      - 'scripts/setup-play-deploy-secrets.sh'
      - 'scripts/setup-discord-deploy-secrets.sh'
      - 'scripts/play_version_code_guard.py'
      - 'scripts/release_provenance_manifest.py'
      - 'scripts/verify_lint_registry.py'
      - 'scripts/check_workflow_gradle_tasks.py'
      - 'scripts/tests/**'
      - '.github/workflows/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ops-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify_ops_ci:
    name: Classify Ops CI scope
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.filter.outputs.functions }}
      release_helpers: ${{ steps.filter.outputs.release_helpers }}
      docs_contract: ${{ steps.filter.outputs.docs_contract }}
      workflow_syntax: ${{ steps.filter.outputs.workflow_syntax }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Classify changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            functions:
              - 'functions/**'
            release_helpers:
              - 'scripts/promote-google-play-track.js'
              - 'scripts/notify-discord-deploy.py'
              - 'scripts/check-release-readiness.sh'
              - 'scripts/check-latest-production-deployed.sh'
              - 'scripts/release-start.sh'
              - 'scripts/bump-version.sh'
              - 'scripts/validate-play-deploy-ref.sh'
              - 'scripts/validate-play-rollout-inputs.js'
              - 'scripts/release-tag.sh'
              - 'scripts/check-play-deploy-secret-contract.sh'
              - 'scripts/setup-play-deploy-secrets.sh'
              - 'scripts/setup-discord-deploy-secrets.sh'
              - 'scripts/play_version_code_guard.py'
              - 'scripts/release_provenance_manifest.py'
              - 'scripts/verify_lint_registry.py'
              - 'scripts/check_workflow_gradle_tasks.py'
              - 'scripts/tests/**'
            docs_contract:
              - 'docs/**'
              - '**/*.md'
              - 'scripts/tests/test_play_deploy_secret_contract_runbook.py'
              - 'scripts/tests/test_release_build_workflow_scope.py'
              - 'scripts/tests/test_release_qa_runtime_gate_docs.py'
              - 'scripts/tests/test_android_ci_runtime_smoke_docs.py'
              - 'scripts/tests/test_release_guard_hotfix_sync.py'
              - 'scripts/tests/test_release_provenance_workflow_contract.py'
              - 'scripts/tests/test_acquisition_attribution_docs_contract.py'
              - 'scripts/tests/test_review_prompt_post_release_followthrough_docs.py'
              - 'scripts/tests/test_branch_hygiene_policy.py'
              - 'scripts/tests/test_ops_ci_workflow.py'
              - 'scripts/tests/test_actionlint_gate.py'
              - '.github/workflows/branch-hygiene.yml'
              - '.github/workflows/android-ci.yml'
              - '.github/workflows/ops-ci.yml'
              - '.github/workflows/play-deploy.yml'
              - '.github/workflows/release-build.yml'
              - '.github/workflows/release-qa.yml'
              - '.github/workflows/version-guard.yml'
            workflow_syntax:
              - '.github/workflows/**'

  actionlint:
    name: Workflow syntax lint
    needs: classify_ops_ci
    if: github.event_name == 'workflow_dispatch' || needs.classify_ops_ci.outputs.workflow_syntax == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ACTIONLINT_VERSION: 1.7.12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install actionlint
        run: |
          set -euo pipefail
          curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- "$ACTIONLINT_VERSION" /usr/local/bin

      - name: Run actionlint
        run: actionlint

  docs-contract:
    name: Docs/runbook contract tests
    needs: classify_ops_ci
    if: github.event_name == 'workflow_dispatch' || needs.classify_ops_ci.outputs.docs_contract == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run docs/runbook contract tests
        run: >-
          python3 -m unittest
          scripts.tests.test_play_deploy_secret_contract_runbook
          scripts.tests.test_release_build_workflow_scope
          scripts.tests.test_release_qa_runtime_gate_docs
          scripts.tests.test_android_ci_runtime_smoke_docs
          scripts.tests.test_release_guard_hotfix_sync
          scripts.tests.test_release_provenance_workflow_contract
          scripts.tests.test_acquisition_attribution_docs_contract
          scripts.tests.test_review_prompt_post_release_followthrough_docs
          scripts.tests.test_branch_hygiene_policy
          scripts.tests.test_ops_ci_workflow
          scripts.tests.test_actionlint_gate

  functions:
    name: Firebase Functions verification
    needs: classify_ops_ci
    if: github.event_name == 'workflow_dispatch' || needs.classify_ops_ci.outputs.functions == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check Firebase Functions
        run: npm run lint

      - name: Run Firebase Functions tests
        run: npm test

  release-helper-scripts:
    name: Release helper script verification
    needs: classify_ops_ci
    if: github.event_name == 'workflow_dispatch' || needs.classify_ops_ci.outputs.release_helpers == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run Google Play promotion helper tests
        run: node --test scripts/tests/test_promote_google_play_track.js

      - name: Check staged rollout validator syntax
        run: node --check scripts/validate-play-rollout-inputs.js

      - name: Run release-helper guardrail Python tests
        run: python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Check release-helper shell syntax
        run: bash -n scripts/check-release-readiness.sh scripts/check-latest-production-deployed.sh scripts/release-start.sh scripts/bump-version.sh scripts/validate-play-deploy-ref.sh scripts/release-tag.sh scripts/check-play-deploy-secret-contract.sh scripts/setup-play-deploy-secrets.sh scripts/setup-discord-deploy-secrets.sh

      - name: Compile Discord deploy notification script
        run: python3 -m py_compile scripts/notify-discord-deploy.py

      - name: Compile release provenance manifest script
        run: python3 -m py_compile scripts/release_provenance_manifest.py
