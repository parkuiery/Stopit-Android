name: Ops CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'functions/**'
      - 'scripts/promote-google-play-track.js'
      - 'scripts/notify-discord-deploy.py'
      - 'scripts/tests/**'
      - '.github/workflows/ops-ci.yml'
  push:
    branches: [main, develop]
    paths:
      - 'functions/**'
      - 'scripts/promote-google-play-track.js'
      - 'scripts/notify-discord-deploy.py'
      - 'scripts/tests/**'
      - '.github/workflows/ops-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ops-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functions:
    name: Firebase Functions verification
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check Firebase Functions
        run: npm run lint

      - name: Run Firebase Functions tests
        run: npm test

  release-helper-scripts:
    name: Release helper script verification
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run Google Play promotion helper tests
        run: node --test scripts/tests/test_promote_google_play_track.js

      - name: Compile Discord deploy notification script
        run: python3 -m py_compile scripts/notify-discord-deploy.py
