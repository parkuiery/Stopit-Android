name: Android Play Deploy

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      track:
        description: Google Play track to upload to
        type: choice
        required: true
        default: internal
        options:
          - internal
          - alpha
          - beta
          - production
      release_status:
        description: Google Play release status
        type: choice
        required: true
        default: completed
        options:
          - draft
          - completed
          - inProgress
          - halted
      rollout_fraction:
        description: Required only when release_status is inProgress. Example 0.05
        required: false
        default: ''

permissions:
  contents: write
  deployments: write
  actions: read

concurrency:
  group: android-play-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Upload signed AAB to Google Play
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.track == 'production' && 'production' || 'play-deploy-non-production' }}

    env:
      PACKAGE_NAME: com.uiery.keep
      DEPLOY_TRACK: ${{ github.event.inputs.track || 'internal' }}
      RELEASE_STATUS: ${{ github.event.inputs.release_status || 'completed' }}
      ROLLOUT_FRACTION: ${{ github.event.inputs.rollout_fraction || '' }}
      ANDROID_KEYSTORE_PATH: /tmp/stopit-upload-key.jks
      GOOGLE_PLAY_SERVICE_ACCOUNT_PATH: /tmp/google-play-service-account.json

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 17
        if: env.DEPLOY_TRACK != 'production'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        if: env.DEPLOY_TRACK != 'production'
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        if: env.DEPLOY_TRACK != 'production'
        run: chmod +x ./gradlew

      - name: Validate manual deploy ref is a SemVer tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Manual Play deploys require a SemVer tag ref; got $GITHUB_REF_NAME" >&2
            echo "This applies to internal, alpha, beta, and production workflow_dispatch runs." >&2
            exit 1
          fi

      - name: Validate Play deploy release guardrails
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/validate-play-deploy-ref.sh

      - name: Validate non-production staged rollout inputs
        if: env.DEPLOY_TRACK != 'production'
        run: node scripts/validate-play-rollout-inputs.js

      - name: Validate production staged rollout inputs
        if: env.DEPLOY_TRACK == 'production'
        run: |
          node - <<'NODE'
          const { validateReleaseStatusAndRolloutFraction } = require('./scripts/promote-google-play-track.js');
          validateReleaseStatusAndRolloutFraction(process.env.RELEASE_STATUS || 'completed', process.env.ROLLOUT_FRACTION || '');
          console.log(`Validated production staged rollout input: release_status=${process.env.RELEASE_STATUS || 'completed'}, rollout_fraction=${process.env.ROLLOUT_FRACTION || ''}`);
          NODE

      - name: Validate build/upload deployment secrets
        if: env.DEPLOY_TRACK != 'production'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo 'ANDROID_KEYSTORE_BASE64 secret is missing'; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo 'ANDROID_KEYSTORE_PASSWORD secret is missing'; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo 'ANDROID_KEY_ALIAS secret is missing'; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo 'ANDROID_KEY_PASSWORD secret is missing'; exit 1; }
          test -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" || { echo 'GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is missing'; exit 1; }
          test -n "$GOOGLE_SERVICES_JSON" || { echo 'GOOGLE_SERVICES_JSON secret is missing'; exit 1; }

      - name: Decode signing, Firebase, and Play credentials
        if: env.DEPLOY_TRACK != 'production'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > "$GOOGLE_PLAY_SERVICE_ACCOUNT_PATH"
          mkdir -p app/src/prod
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/src/prod/google-services.json
          chmod 600 "$ANDROID_KEYSTORE_PATH" "$GOOGLE_PLAY_SERVICE_ACCOUNT_PATH" app/src/prod/google-services.json

      - name: Run release unit tests
        if: env.DEPLOY_TRACK != 'production'
        run: ./gradlew :app:testProdReleaseUnitTest

      - name: Run prod release lint
        if: env.DEPLOY_TRACK != 'production'
        run: ./gradlew :app:lintProdRelease

      - name: Verify Navigation/Compose lint registry coverage
        if: env.DEPLOY_TRACK != 'production'
        run: >-
          python3 scripts/verify_lint_registry.py
          --report app/build/reports/lint-results-prodRelease.html
          --require-section "Included Additional Checks"
          --require-identifier androidx.navigation.common
          --require-identifier androidx.navigation.compose
          --require-identifier androidx.navigation.runtime
          --require-issue-id MissingSerializableAnnotation
          --require-issue-id MissingKeepAnnotation
          --require-issue-id WrongNavigateRouteType
          --forbid-text "Requires newer lint; these checks will be skipped!"
          --forbid-text ObsoleteLintCustomCheck

      - name: Resolve production promotion versionCode from selected tag
        if: env.DEPLOY_TRACK == 'production'
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Production promotion requires a SemVer tag ref; got $GITHUB_REF_NAME" >&2
            exit 1
          fi

          version_code="$(python3 - <<'PY'
          import pathlib
          import re

          text = pathlib.Path('app/build.gradle.kts').read_text(encoding='utf-8')
          match = re.search(r'versionCode\s*=\s*(\d+)', text)
          if not match:
              raise SystemExit('Unable to resolve versionCode from app/build.gradle.kts')
          print(match.group(1))
          PY
          )"

          echo "VERSION_CODE=$version_code" >> "$GITHUB_ENV"
          echo "Resolved production promotion tag $GITHUB_REF_NAME to versionCode=$version_code"

      - name: Download prior internal provenance artifact
        if: env.DEPLOY_TRACK == 'production'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/stopit-prior-internal-provenance
          echo "PROVENANCE_VERIFY_MODE=full" >> "$GITHUB_ENV"

          download_durable_fallback() {
            echo "Attempting durable release-provenance.json fallback from GitHub Release $GITHUB_REF_NAME" >&2
            if gh release download "$GITHUB_REF_NAME" \
              --pattern release-provenance.json \
              --dir /tmp/stopit-prior-internal-provenance \
              --clobber; then
              test -f /tmp/stopit-prior-internal-provenance/release-provenance.json || {
                echo "durable fallback missing: GitHub Release asset download completed but release-provenance.json is absent." >&2
                return 1
              }
              echo "PROVENANCE_VERIFY_MODE=metadata-only" >> "$GITHUB_ENV"
              echo "Recovered durable release-provenance.json fallback for $GITHUB_REF_NAME; production promotion will run metadata-only provenance verification before secrets." >&2
              return 0
            fi
            echo "durable fallback missing: GitHub Release $GITHUB_REF_NAME has no release-provenance.json asset available to recover expired/missing prior internal artifact evidence." >&2
            return 1
          }

          run_id=""
          run_event=""
          for event_name in push workflow_dispatch; do
            candidate_run_id="$(gh run list \
              --workflow 'Android Play Deploy' \
              --branch "$GITHUB_REF_NAME" \
              --event "$event_name" \
              --status success \
              --limit 20 \
              --json databaseId,headSha,conclusion \
              --jq ".[] | select(.headSha == \"$GITHUB_SHA\" and .conclusion == \"success\") | .databaseId" \
              | head -n 1)"
            if [[ -n "$candidate_run_id" ]]; then
              run_id="$candidate_run_id"
              run_event="$event_name"
              break
            fi
          done
          if [[ -z "$run_id" ]]; then
            echo "No successful prior internal Play Deploy run found for $GITHUB_REF_NAME / $GITHUB_SHA across push or workflow_dispatch events" >&2
            download_durable_fallback || {
              echo "Recovery: rerun a non-production Play Deploy for this SemVer tag or attach the long-lived release-provenance.json fallback before production promotion." >&2
              exit 1
            }
            exit 0
          fi
          echo "PRIOR_PROVENANCE_RUN_EVENT=$run_event" >> "$GITHUB_ENV"
          echo "Selected prior internal Play Deploy run_id=$run_id from event=$run_event for $GITHUB_REF_NAME / $GITHUB_SHA"
          if ! gh run download "$run_id" \
            --name stopit-prod-release-signed-aab \
            --dir /tmp/stopit-prior-internal-provenance; then
            echo "Prior internal provenance artifact expired/missing for run_id=$run_id event=$run_event ($GITHUB_REF_NAME / $GITHUB_SHA)." >&2
            download_durable_fallback || {
              echo "Recovery: rerun non-production Play Deploy for the same SemVer tag before production promotion." >&2
              exit 1
            }
            exit 0
          fi
          test -n "$(find /tmp/stopit-prior-internal-provenance -name release-provenance.json -print -quit)" || {
            echo "Downloaded prior internal artifact is missing release-provenance.json; classify this separately from provenance mismatch." >&2
            download_durable_fallback || {
              echo "Recovery: rerun non-production Play Deploy for the same SemVer tag." >&2
              exit 1
            }
          }

      - name: Verify prior internal provenance before production promotion
        if: env.DEPLOY_TRACK == 'production'
        run: |
          set -euo pipefail
          args=(
            verify
            --aab-glob '/tmp/stopit-prior-internal-provenance/**/*.aab'
            --manifest /tmp/stopit-prior-internal-provenance/release-provenance.json
            --artifact-name stopit-prod-release-signed-aab
            --package-name "$PACKAGE_NAME"
            --upload-mode play-upload
            --track internal
            --release-status completed
            --rollout-fraction ''
            --expected-version-code "$VERSION_CODE"
            --expected-git-sha "$GITHUB_SHA"
            --expected-git-ref "$GITHUB_REF"
            --expected-git-ref-name "$GITHUB_REF_NAME"
            --allow-artifact-path-relocation
          )
          if [[ "${PROVENANCE_VERIFY_MODE:-full}" == "metadata-only" ]]; then
            args+=(--metadata-only)
          fi
          python3 scripts/release_provenance_manifest.py "${args[@]}"

      - name: Validate production promotion secrets
        if: env.DEPLOY_TRACK == 'production'
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          test -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" || { echo 'GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is missing'; exit 1; }

      - name: Decode Play credentials for production promotion
        if: env.DEPLOY_TRACK == 'production'
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > "$GOOGLE_PLAY_SERVICE_ACCOUNT_PATH"
          chmod 600 "$GOOGLE_PLAY_SERVICE_ACCOUNT_PATH"

      - name: Build signed prod release bundle
        if: env.DEPLOY_TRACK != 'production'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:bundleProdRelease

      - name: Generate Play upload provenance manifest
        if: env.DEPLOY_TRACK != 'production'
        run: >-
          python3 scripts/release_provenance_manifest.py generate
          --aab-glob 'app/build/outputs/bundle/prodRelease/*.aab'
          --output app/build/outputs/bundle/prodRelease/release-provenance.json
          --artifact-name stopit-prod-release-signed-aab
          --package-name "$PACKAGE_NAME"
          --upload-mode play-upload
          --track "$DEPLOY_TRACK"
          --release-status "$RELEASE_STATUS"
          --rollout-fraction "$ROLLOUT_FRACTION"

      - name: Verify Play upload provenance manifest
        if: env.DEPLOY_TRACK != 'production'
        run: >-
          python3 scripts/release_provenance_manifest.py verify
          --aab-glob 'app/build/outputs/bundle/prodRelease/*.aab'
          --manifest app/build/outputs/bundle/prodRelease/release-provenance.json
          --artifact-name stopit-prod-release-signed-aab
          --package-name "$PACKAGE_NAME"
          --upload-mode play-upload
          --track "$DEPLOY_TRACK"
          --release-status "$RELEASE_STATUS"
          --rollout-fraction "$ROLLOUT_FRACTION"

      - name: Upload Play deploy release diagnostics
        if: always() && env.DEPLOY_TRACK != 'production'
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: stopit-play-deploy-release-diagnostics
          path: |
            app/build/reports/**
            app/build/test-results/**
            app/build/outputs/logs/**
            app/build/outputs/mapping/prodRelease/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload signed AAB artifact
        if: env.DEPLOY_TRACK != 'production'
        uses: actions/upload-artifact@v7
        with:
          name: stopit-prod-release-signed-aab
          path: |
            app/build/outputs/bundle/prodRelease/*.aab
            app/build/outputs/bundle/prodRelease/release-provenance.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload to Google Play
        if: env.DEPLOY_TRACK != 'production'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_PATH }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: app/build/outputs/bundle/prodRelease/*.aab
          tracks: ${{ env.DEPLOY_TRACK }}
          status: ${{ env.RELEASE_STATUS }}
          userFraction: ${{ env.ROLLOUT_FRACTION }}

      - name: Publish durable provenance fallback to GitHub Release
        if: env.DEPLOY_TRACK != 'production'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          post_upload_failure() {
            local reason="$1"
            {
              echo "## Post-upload durable provenance publish failure"
              echo ""
              echo "Google Play upload already completed before this step, but publishing the durable GitHub Release \`release-provenance.json\` fallback failed: $reason"
              echo ""
              echo "Treat this as an evidence-publish failure, not as proof that the Play upload failed. Do not blindly re-upload the same versionCode. Recover by rerunning the same-tag non-production Play Deploy or by attaching the verified \`release-provenance.json\` fallback before production promotion."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "post-upload durable provenance publish failure: $reason" >&2
            echo "Play upload succeeded earlier in this job; classify recovery separately from Google Play upload failure and avoid blind same-versionCode re-upload." >&2
            exit 1
          }

          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            post_upload_failure "SemVer tag ref is required; got $GITHUB_REF_NAME"
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub Release $GITHUB_REF_NAME already exists; uploading release-provenance.json fallback."
          else
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "$GITHUB_REF_NAME" \
              --notes "Stopit $GITHUB_REF_NAME release provenance fallback." \
              || post_upload_failure "GitHub Release create failed for $GITHUB_REF_NAME"
          fi
          gh release upload "$GITHUB_REF_NAME" app/build/outputs/bundle/prodRelease/release-provenance.json --clobber \
            || post_upload_failure "GitHub Release upload failed for release-provenance.json"
          echo "Published durable release-provenance.json fallback for $GITHUB_REF_NAME after successful $DEPLOY_TRACK Play upload."

      - name: Promote internal release to production
        if: env.DEPLOY_TRACK == 'production'
        env:
          SOURCE_TRACK: internal
        run: node scripts/promote-google-play-track.js

      - name: Mark production deployment complete
        if: success() && env.DEPLOY_TRACK == 'production' && env.RELEASE_STATUS == 'completed'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Production completion marker requires a SemVer tag ref; got $GITHUB_REF_NAME" >&2
            exit 1
          fi

          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          completed_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          marker="<!-- stopit-production-deployed: $GITHUB_REF_NAME -->"

          deployment_payload="$(mktemp)"
          python3 - "$GITHUB_REF_NAME" <<'PY' > "$deployment_payload"
          import json
          import sys

          tag = sys.argv[1]
          json.dump(
              {
                  "ref": tag,
                  "environment": "production",
                  "auto_merge": False,
                  "required_contexts": [],
                  "description": f"Stopit Google Play production deployment for {tag}",
              },
              sys.stdout,
          )
          PY
          deployment_id="$(gh api --method POST "repos/$GITHUB_REPOSITORY/deployments" --input "$deployment_payload" --jq '.id')"

          status_payload="$(mktemp)"
          python3 - "$run_url" <<'PY' > "$status_payload"
          import json
          import sys

          run_url = sys.argv[1]
          json.dump(
              {
                  "state": "success",
                  "environment": "production",
                  "log_url": run_url,
                  "description": "Google Play production upload completed",
                  "auto_inactive": False,
              },
              sys.stdout,
          )
          PY
          gh api --method POST "repos/$GITHUB_REPOSITORY/deployments/$deployment_id/statuses" --input "$status_payload" >/dev/null

          production_notes="$(mktemp)"
          cat > "$production_notes" <<EOF
          ## Production deployment

          - Google Play track: production
          - GitHub Actions: $run_url
          - Completed at: $completed_at

          $marker
          EOF

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            existing_notes="$(mktemp)"
            gh release view "$GITHUB_REF_NAME" --json body --jq '.body // ""' > "$existing_notes"
            if grep -Fq "$marker" "$existing_notes"; then
              echo "GitHub Release already contains production marker for $GITHUB_REF_NAME"
            else
              release_notes="$(mktemp)"
              cat "$existing_notes" > "$release_notes"
              printf '\n\n' >> "$release_notes"
              cat "$production_notes" >> "$release_notes"
              gh release edit "$GITHUB_REF_NAME" --notes-file "$release_notes"
            fi
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --notes-file "$production_notes"
          fi

      - name: Notify Discord deploy channel
        if: success() && (env.DEPLOY_TRACK == 'internal' || env.DEPLOY_TRACK == 'production')
        continue-on-error: true
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_DEPLOY_CHANNEL_ID: ${{ secrets.DISCORD_DEPLOY_CHANNEL_ID }}
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/notify-discord-deploy.py
