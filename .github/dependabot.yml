version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Seoul"
    labels:
      - "maintenance"
      - "automation"
      - "dependencies"
    open-pull-requests-limit: 3
    groups:
      android-gradle-patch-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: "Asia/Seoul"
    labels:
      - "maintenance"
      - "automation"
      - "dependencies"
    open-pull-requests-limit: 2
    groups:
      github-actions-patch-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "npm"
    directory: "/functions"
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: "Asia/Seoul"
    labels:
      - "maintenance"
      - "automation"
      - "dependencies"
    open-pull-requests-limit: 2
    groups:
      functions-npm-patch-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "bun"
    directory: "/tools/aso-screenshots"
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: "Asia/Seoul"
    labels:
      - "maintenance"
      - "automation"
      - "dependencies"
    open-pull-requests-limit: 2
    groups:
      aso-screenshots-bun-patch-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
