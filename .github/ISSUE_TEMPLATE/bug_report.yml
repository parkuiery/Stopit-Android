name: Bug report
description: Report a reproducible Stopit Android bug
title: "fix: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: 1.7.1 / versionCode 23
  - type: input
    id: device
    attributes:
      label: Device / Android version
      placeholder: Pixel 8, Android 15
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: text
